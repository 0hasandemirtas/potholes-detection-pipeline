model:
  path: models/best_updated_aug.pt

video:
  input: input/klip2_4.40-5.00_slow0.8x.mp4
  output: output/videos/output_klip2_4.40-5.00_bytetrack_no_smoothing.mp4
#yol_videosu_klip1_3.20-3.45.mp4
#yol_videosu_klip2_4.40-5.00.mp4
#yol_videosu_klip3_6.10-6.30.mp4
#yol_videosu_klip4_7.00-7.25.mp4
#cok_kotu.mp4
tracking:
  backend: ultralytics
  tracker: botsort.yaml
  conf: 0.1
  imgsz: 960
  n_confirm: 3
  m_persist: 1
  confirmed_window: 5
  device: 0

smoothing:
  type: none
  alpha: 0.5

output:
  csv: output/csv/output_bytetrack_no_smoothing.csv
  log: output/logs/pipeline_bytetrack_no_smoothing.log
  benchmark_csv: output/benchmarks/results.csv
  auto_name: true
  root_dir: output

roi:
  points:
    - [0.46, 0.50]
    - [0.54, 0.50]
    - [1.00, 0.85]
    - [0.00, 0.85]

visualization:
  draw_mask: false
  draw_roi: true
  max_stale_frames: 1
